<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Component Interop — demo of sharing resources between two component libraries</title>

  <!-- The shell's tabs use data-handler (a sol-components capability), so it loads
       sol-components' manifest from the CDN; one interop:activate listener swaps the
       panel. Every tab is a self-contained page in an iframe. -->
  <script src="../component-interop.js"
          data-stage="auto"
          data-manifest="sol-components.manifest.json"
          data-attributes="data-handler"
  ></script>

  <style>
    :root { color-scheme: light; font-size: 18px; }
    * { box-sizing: border-box; }
    html, body { height: 100%; background: #2f333d; color: #e6e8ec; }
    /* Viewport-height column: header + tabs stay put, the active panel fills to the bottom. */
    body  { font: 1rem/1.6 system-ui, sans-serif; margin: 0 auto; padding: 1.5rem 2rem 2rem;
            max-width: 64rem; display: flex; flex-direction: column; }
    h1    { font-size: 1.5rem; margin: 0 0 .25rem; color: #f3f4f6; }
    body > p { margin: 0 0 1rem; }   /* space above the tabs; tabs sit flush on the panel */
    a     { color: #8ab4f8; }
    a:hover { color: #b3d0fb; }
    .intro { background: #eef4ff; border: 1px solid #b9ccea; border-radius: 8px;
             padding: 1rem 1.25rem; color: #1a1a1a; margin: 1rem 0 1.5rem; }
    code { background: #e7e9f5; color: #1a1a1a; padding: 0 .25rem; border-radius: 3px; }

    .tabs { display: flex; flex-wrap: wrap; gap: .2rem; border-bottom: 2px solid #5b6270; flex: none; }
    .tabs button[role="tab"] {
      font: inherit; font-size: 1rem; cursor: pointer;
      background: #4b515e; color: #e6e8ec;
      border: 1px solid #5b6270; border-bottom: none;
      border-radius: 8px 8px 0 0; padding: .35rem .7rem; margin-bottom: -2px;
      /* each multi-word title breaks at its <br> onto two lines; nowrap keeps tokens intact */
      white-space: nowrap; text-align: center; line-height: 1.2;
    }
    .tabs button[role="tab"][aria-selected="true"] {
      background: #eef4ff; color: #1a1a1a; border-color: #5b6270; border-bottom: 2px solid #eef4ff;
      font-weight: 600;
    }
    .tabs button[role="tab"]:focus-visible { outline: 2px solid #9db8e8; outline-offset: 2px; }

    [role="tabpanel"] { background: #eef4ff; color: #1a1a1a; border: 1px solid #5b6270;
      border-top: none; border-radius: 0 0 8px 8px; flex: 1 1 auto; min-height: 0; }
    [role="tabpanel"][hidden] { display: none; }
    iframe { display: block; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>

<h1>Component Interop Demo</h1>

<div class="tabs" role="tablist" aria-label="component-interop demos">

  <button role="tab" id="tab-intro"      data-handler="intro"      aria-controls="panel-intro"      aria-selected="true"  tabindex="0">Intro</button>

  <button role="tab" id="tab-navigation" data-handler="navigation" aria-controls="panel-navigation" aria-selected="false" tabindex="-1">Shared<br>Navigation</button>

  <button role="tab" id="tab-store"      data-handler="store"      aria-controls="panel-store"      aria-selected="false" tabindex="-1">Shared<br>Store</button>

  <button role="tab" id="tab-auth"       data-handler="auth"       aria-controls="panel-auth"       aria-selected="false" tabindex="-1">Shared<br>Auth</button>

  <button role="tab" id="tab-interop"    data-handler="interop"    aria-controls="panel-interop"    aria-selected="false"  tabindex="-1">Clickable<br>Components</button>

  <button role="tab" id="tab-query"      data-handler="query"      aria-controls="panel-query"      aria-selected="false" tabindex="-1">SPARQL<br>Anywhere</button>

  <button role="tab" id="tab-forms"      data-handler="forms"      aria-controls="panel-forms"      aria-selected="false" tabindex="-1">Auto-generated<br>Forms</button>

  <button role="tab" id="tab-authoring"  data-handler="authoring"  aria-controls="panel-authoring"  aria-selected="false" tabindex="-1">Authoring for<br>Component Interop</button>
</div>

<div role="tabpanel" id="panel-intro" aria-labelledby="tab-intro">
  <iframe data-src="intro.html" title="Intro" loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-interop" aria-labelledby="tab-interop" hidden>
  <iframe data-src="interop.html" title="What component-interop provides" loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-navigation" aria-labelledby="tab-navigation" hidden>
  <iframe data-src="navigation.html" title="Shared Navigation demo" loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-store" aria-labelledby="tab-store" hidden>
  <iframe data-src="store.html" title="Shared Store demo" loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-forms" aria-labelledby="tab-forms" hidden>
  <iframe data-src="forms.html" title="Forms demo" loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-query" aria-labelledby="tab-query" hidden>
  <iframe data-src="query.html" title="Query demo" loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-auth"  aria-labelledby="tab-auth" hidden>
  <iframe data-src="auth.html"  title="Auth demo"  loading="lazy"></iframe>
</div>
<div role="tabpanel" id="panel-authoring" aria-labelledby="tab-authoring" hidden>
  <iframe data-src="authoring.html" title="Authoring for Component Interop" loading="lazy"></iframe>
</div>

<script type="module">
  // These demos use ES modules, fetch (manifests) and import maps — none of which
  // run from file://. Show how to serve instead of a cryptic broken page.
  if (location.protocol === 'file:') {
    document.body.innerHTML =
      '<h1>Serve this over http</h1>' +
      '<div class="intro" role="alert">These examples can’t run from <code>file://</code> ' +
      '(ES modules, fetch and import maps need an http origin). Serve the folder that holds both ' +
      '<code>component-interop/</code> and <code>sol-components/</code>, then open the http URL:' +
      '<pre>python3 -m http.server 8080\n# then open\nhttp://localhost:8080/component-interop/examples/solpos/</pre></div>';
    throw new Error('solpos: file:// is not supported — serve over http');
  }

  // Match the on-screen tab order (the tablist DOM order) so arrow keys / Home /
  // End move left-to-right as displayed.
  const order = ['intro', 'navigation', 'store', 'auth', 'interop', 'query', 'forms', 'authoring'];
  const tab   = (k) => document.getElementById('tab-' + k);
  const panel = (k) => document.getElementById('panel-' + k);

  function activate(key, { focus = false } = {}) {
    if (!order.includes(key)) return;
    for (const k of order) {
      const selected = k === key;
      const t = tab(k), p = panel(k);
      t.setAttribute('aria-selected', String(selected));
      t.tabIndex = selected ? 0 : -1;
      p.hidden = !selected;
    }
    // Lazy-load the iframe the first time its tab is shown.
    const frame = panel(key).querySelector('iframe');
    if (frame && !frame.src && frame.dataset.src) frame.src = frame.dataset.src;
    if (focus) tab(key).focus();
  }

  // The tabs are driven by component-interop's handler capability: a click or
  // Enter/Space on a [data-handler] button fires interop:activate.
  document.addEventListener('interop:activate', (e) => activate(e.detail.handler));

  // Arrow-key roving focus + activation across the tablist (ARIA tab pattern).
  document.querySelector('[role="tablist"]').addEventListener('keydown', (e) => {
    const i = order.indexOf(document.activeElement?.dataset?.handler);
    if (i === -1) return;
    let next = null;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = order[(i + 1) % order.length];
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = order[(i - 1 + order.length) % order.length];
    else if (e.key === 'Home') next = order[0];
    else if (e.key === 'End') next = order[order.length - 1];
    if (next) { e.preventDefault(); activate(next, { focus: true }); }
  });

  // Show the first tab immediately (independent of when ci finishes loading).
  activate('intro');
</script>

<!-- Hosts the full-height "View code" modal: each tab's button calls up to
     window.parent.solposViewCode() so the modal fills the whole page, not the tab. -->
<script src="view-code.js"></script>

</body>
</html>
